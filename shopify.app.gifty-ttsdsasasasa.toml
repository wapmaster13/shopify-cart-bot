# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e2aa7e28cf273e30e3a843f59bc60b78"
name = "GiftCart: Gift with purchase"
application_url = "https://cartbot-shopify.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,read_orders,read_products,write_cart_transforms,write_products,read_themes"

[auth]
redirect_urls = [
  "https://cartbot-shopify.fly.dev/auth/callback",
  "https://cartbot-shopify.fly.dev/auth/shopify/callback",
  "https://cartbot-shopify.fly.dev/api/auth/callback"
]

[app_proxy]
url = "https://cartbot-shopify.fly.dev"
subpath = "advanced-cart-bot"
prefix = "apps"
