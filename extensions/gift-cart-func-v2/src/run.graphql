query RunInput {
  cart {
    lines {
      id
      quantity
      cost { totalAmount { amount currencyCode } }
      merchandise {
        ... on ProductVariant {
          id
          product { title } # CEREM TITLUL PRODUSULUI
        }
      }
    }
  }
  cartTransform {
    metafield(namespace: "cart_bot", key: "rules_data") { value }
  }
}