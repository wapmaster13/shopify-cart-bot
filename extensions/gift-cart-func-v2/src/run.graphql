query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        totalAmount {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          title
        }
      }
    }
  }
  cartTransform {
    metafield(namespace: "cart_bot", key: "rules_data") {
      value
    }
  }
}