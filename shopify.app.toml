# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e2aa7e28cf273e30e3a843f59bc60b78"
name = "GiftCart: Gift with purchase"
handle = "giftcart-bot"
application_url = "https://app.giftcart-bot.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-store.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# Scopes for orders, customers, and logic
scopes = "write_products,read_products,write_customers,read_customers,write_orders,read_orders,write_discounts,read_discounts,write_cart_transforms,read_cart_transforms,read_themes"

[auth]
redirect_urls = [
  "https://shopify.com/auth/callback",
  "https://shopify.com/auth/shopify/callback",
  "https://shopify.com/api/auth/callback"
]

[webhooks]
api_version = "2024-07"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks"
  customer_data_request_url = "/webhooks"
  shop_deletion_url = "/webhooks"

[pos]
embedded = false

[app_proxy]
url = "https://app.giftcart-bot.com"
subpath = "advanced-cart-bot"
prefix = "apps"
